<div class="container mt-4">

  <h2 class="mb-4">Usuários</h2>

  @if (loading()) {
    <div class="text-center">
      <div class="spinner-border"></div>
    </div>
  }

  @if (!loading()) {
    <table class="table table-striped table-hover">

      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Role</th>
        </tr>
      </thead>

      <tbody>
        @for (user of users(); track user.id) {
          <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
          </tr>
        }
      </tbody>

    </table>
  }

</div>
