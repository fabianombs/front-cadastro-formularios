name: Deploy — Produção (master)

on:
  push:
    branches:
      - master

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS AWS — configure em: GitHub → Settings → Secrets and variables →
#               Actions → New repository secret
#
#   AWS_ACCESS_KEY_ID       → terraform output github_actions_access_key_id
#   AWS_SECRET_ACCESS_KEY   → terraform output -raw github_actions_secret_access_key
#   AWS_REGION              → região onde criou os buckets (ex: sa-east-1)
#   S3_BUCKET_PROD          → terraform output (ou nome manual: app-forms-clients-prod)
#   CF_DISTRIBUTION_PROD    → terraform output prod_cloudfront_distribution_id
#
# ENVIRONMENT DE APROVAÇÃO — configure em: GitHub → Settings → Environments →
#   New environment → nome: "production" → adicionar Required reviewers
#   (isso exige aprovação manual antes de fazer deploy em prod)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy-prod:
    name: Build & Deploy to S3/CloudFront (prod)
    runs-on: ubuntu-latest
    # ↓ "production" é o nome do Environment no GitHub — exige aprovação manual
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npx ng build --configuration=production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # ↓ AWS_ACCESS_KEY_ID — chave do IAM user gerado pelo Terraform
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # ↓ AWS_SECRET_ACCESS_KEY — secret do IAM user gerado pelo Terraform
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # ↓ AWS_REGION — ex: sa-east-1
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3 (no-cache for all files)
        run: |
          # ↓ S3_BUCKET_PROD — nome do bucket prod (ex: app-forms-clients-prod)
          aws s3 sync dist/app-forms-clients/browser/ s3://${{ secrets.S3_BUCKET_PROD }}/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Set long-term cache for hashed assets
        run: |
          aws s3 cp s3://${{ secrets.S3_BUCKET_PROD }}/ s3://${{ secrets.S3_BUCKET_PROD }}/ \
            --recursive \
            --exclude "*" \
            --include "*.js" \
            --include "*.css" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          # ↓ CF_DISTRIBUTION_PROD — ID da distribuição CloudFront prod
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_PROD }} \
            --paths "/*"
