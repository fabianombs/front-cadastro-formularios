<header class="app-header">
  <div class="header-inner">
    <a class="brand" routerLink="/" (click)="closeMenu()">
      <div class="brand-icon">
        <img src="/imgs/flexform.png" alt="FlexForm" />
      </div>
      <span class="brand-name">FlexForm</span>
    </a>

    <!-- Hamburger (mobile only) -->
    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()" aria-label="Abrir menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Nav collapse (desktop inline / mobile dropdown) -->
    <div class="header-collapse" [class.open]="menuOpen()">
      <nav class="header-nav">
        @for (item of menuItems(); track item.path) {
        <a class="nav-link" [routerLink]="item.path" [queryParams]="item.queryParams" (click)="closeMenu()">
          {{ item.label }}
        </a>
        }
      </nav>

      @if (user()) {
      <div class="header-right">
        <div class="user-pill">
          <div class="user-avatar">{{ user()?.sub?.charAt(0)?.toUpperCase() }}</div>
          <div class="user-info">
            <span class="user-name">{{ user()?.sub }}</span>
            <span class="user-role">{{ user()?.role }}</span>
          </div>
        </div>

        <!-- Theme toggle -->
        <button
          class="theme-toggle"
          (click)="themeService.toggle()"
          [attr.aria-label]="themeService.isDark() ? 'Ativar modo claro' : 'Ativar modo escuro'"
          [title]="themeService.isDark() ? 'Modo claro' : 'Modo escuro'"
        >
          @if (themeService.isDark()) {
            <!-- Sun icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <line x1="12" y1="2" x2="12" y2="4"/>
              <line x1="12" y1="20" x2="12" y2="22"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="2" y1="12" x2="4" y2="12"/>
              <line x1="20" y1="12" x2="22" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          } @else {
            <!-- Moon icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          }
        </button>

        <button class="logout-btn" (click)="logout()">Sair</button>
      </div>
      }
    </div>
  </div>

  <!-- Mobile overlay -->
  @if (menuOpen()) {
  <div class="nav-overlay" (click)="closeMenu()"></div>
  }
</header>
