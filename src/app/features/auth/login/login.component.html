<div class="auth-wrapper" (mousemove)="onMouseMove($event)">

  <!-- 🎨 LADO VISUAL -->
  <div class="auth-visual">
    <div class="overlay"></div>

    <div class="content">
      <h1>Bem-vindo de volta 👋</h1>
      <p>Acesse sua conta para continuar</p>
    </div>
  </div>

  <!-- 🔐 FORM -->
  <div class="auth-form">

    <div class="card">

      <h2>Login</h2>

      @if (error()) {
        <div class="error">
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()">

        <!-- USERNAME -->
        <div class="input-group">
          <input
            type="text"
            formControlName="username"
            required
          >
          <label>Username</label>
        </div>

        <!-- PASSWORD -->
        <div class="input-group">
          <input
            type="password"
            formControlName="password"
            required
          >
          <label>Senha</label>
        </div>

        <!-- BUTTON -->
        <button
          type="submit"
          class="btn-login"
          [disabled]="form.invalid || loading()"
        >
          @if (loading()) {
            <span class="loader"></span>
          } @else {
            Entrar
          }
        </button>

      </form>

      <div class="footer">
        <span>Não tem conta?</span>
        <a routerLink="/register">Criar agora</a>
      </div>

    </div>

  </div>

</div>
