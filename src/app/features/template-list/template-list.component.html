<!-- src/app/features/template-list/template-list.component.html -->
<div class="container mt-4">
  <h3>Formulários {{ isAdmin ? '(Admin)' : '(Meus)' }}</h3>
  <div *ngIf="loading">Carregando...</div>

  <ul class="list-group mt-3" *ngIf="!loading">
    <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let t of templates">
      {{ t.name }}
      <a [routerLink]="['/form', t.slug]" class="btn btn-sm btn-outline-primary">Preencher</a>
      <a [routerLink]="['/form', t.slug, 'submissions']" class="btn btn-sm btn-outline-success" *ngIf="isAdmin">Ver
        Submissões</a>
    </li>
  </ul>
</div>
